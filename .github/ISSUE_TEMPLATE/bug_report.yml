name: Bug report
description: Something broken in RenForge
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: RenForge version
      placeholder: "0.1.0 (renforge --version)"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Windows 11 / WSL2 Ubuntu, Python 3.12, installed via uvx"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Command and output
      description: The exact command you ran and its full output / traceback.
      render: shell
  - type: input
    id: renpy
    attributes:
      label: Ren'Py version of the project (if relevant)
      placeholder: "8.3.x"
